<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Mapa Rede Verde</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f4f3ed;
        color: #17312d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(183, 200, 141, 0.45), transparent 28%),
          linear-gradient(180deg, #f8f8f2 0%, #f2f0e8 100%);
      }

      main {
        width: min(100%, 460px);
        padding: 28px 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(23, 49, 45, 0.08);
        box-shadow: 0 18px 42px rgba(14, 32, 22, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #50665b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mapa Rede Verde</h1>
      <p>
        Abrindo a aplicacao. Se a tela permanecer aqui, verifique sua conexao com a internet
        e tente novamente.
      </p>
    </main>
  </body>
</html>
